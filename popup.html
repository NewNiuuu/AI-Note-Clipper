<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f9fa;
    }

    h2 {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 16px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
    }

    input[type="password"],
    textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d0d5dd;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    input[type="password"]:focus,
    textarea:focus {
      border-color: #3b82f6;
    }

    textarea {
      height: 80px;
      resize: vertical;
      font-family: inherit;
    }

    button {
      width: 100%;
      padding: 9px 0;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #2d2d4a;
    }

    .hint {
      font-size: 11px;
      color: #999;
      margin-top: 12px;
      line-height: 1.5;
    }

    #status {
      font-size: 12px;
      color: #22c55e;
      text-align: center;
      margin-top: 10px;
      height: 16px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #status.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <h2>AI Note Clipper 配置</h2>

  <div class="field">
    <label for="apiKey">DeepSeek API Key</label>
    <input type="password" id="apiKey" placeholder="sk-...">
  </div>

  <div class="field">
    <label for="prompt">自定义 Prompt（可选）</label>
    <textarea id="prompt" placeholder="留空则使用默认提示词..."></textarea>
  </div>

  <button id="saveBtn">保存</button>
  <div id="status">✅ 保存成功</div>

  <p class="hint">提示：划选网页文本后，右键点击「提炼核心 Q&A」即可使用。</p>

  <script src="popup.js"></script>
</body>
</html>
